// Shape of the (mock) data we pull from the Merchant API to pre-fill onboarding.
type MerchantPrefill = {
  projectName: string; // pre-fills the project name
  cms: string;         // detected CMS (display label)
  channel: string;     // channel to pre-select in the publish step
};

const MOCK_PROJECT_NAMES = ["Chamazon", "SportGear NL", "TechStore EU"];
const MOCK_CMS = ["Shopify", "WooCommerce", "Magento", "Lightspeed"];

function pickRandom<T>(arr: T[]): T {
  return arr[Math.floor(Math.random() * arr.length)];
}

// Returns randomized mock merchant data, as if returned by the Merchant API.
function mockMerchantApi(): MerchantPrefill {
  return {
    projectName: pickRandom(MOCK_PROJECT_NAMES),
    cms: pickRandom(MOCK_CMS),
    channel: "Google Shopping",
  };
}

// Maps a detected CMS label to the matching ImportPicker tile name so it can be pre-selected.
function cmsToPlatform(cms: string): string {
  const map: Record<string, string> = {
    Shopify: "Shopify Markets",
    WooCommerce: "WooCommerce",
    Magento: "Magento",
    Lightspeed: "Lightspeed",
  };
  return map[cms] ?? cms;
}

function App() {
  // [ADDED] Journey starts in the CSS Merchants tool (the 4-page CSS/Producthero app).
  const [view, setView] = useState<View>("css");

  // ─── [ADDED] CSS→Core cross-sell flow state ────────────────────────────────
  const [storylaneOpen, setStorylaneOpen] = useState(false);     // Storylane tour modal
  const [createProjectOpen, setCreateProjectOpen] = useState(false); // "Create project" popup
  const [prefill, setPrefill] = useState<MerchantPrefill | null>(null); // mock Merchant API data

  // Every conversion surface CTA funnels through here → opens the Storylane tour first.
  const openStorylane = () => setStorylaneOpen(true);

  // "Get started" inside the tour → close tour, fetch mock data, open the Create project popup.
  const handleGetStarted = () => {
    setStorylaneOpen(false);
    setPrefill(mockMerchantApi());
    setCreateProjectOpen(true);
  };

  // Confirm in the Create project popup → close it and enter the guided onboarding (ValuePage).
  const handleCreateProject = () => {
    setCreateProjectOpen(false);
    setView("value-page");
  };
  // ────────────────────────────────────────────────────────────────────────────

  return (
    <div className="flex h-screen overflow-hidden" style={{ fontFamily: "'Inter', sans-serif", fontSize: 14 }}>
      {/* [ADDED] CSS Merchants tool (Dashboard / Products / Labelizer / Exports) is the journey's start.
          Every page's banner CTA → openStorylane → Create project → guided onboarding (ValuePage). */}
      {view === "css" ? (
        <CssMerchantsTool onCta={openStorylane} />
      ) : (
        <>
          <Sidebar />
          <div className="flex-1 flex flex-col min-w-0 overflow-hidden">
            {view === "dashboard"
              ? <Dashboard onBannerClick={openStorylane} />
              : <ValuePage onBack={() => setView("css")} prefill={prefill} />
            }
          </div>
        </>
      )}

      {/* ─── [ADDED] CSS→Core cross-sell overlays ─────────────────────────────── */}
      {storylaneOpen && (
        <StorylaneModal onClose={() => setStorylaneOpen(false)} onGetStarted={handleGetStarted} />
      )}
      {createProjectOpen && prefill && (
        <CreateProjectModal
          prefill={prefill}
          onClose={() => setCreateProjectOpen(false)}
          onCreate={handleCreateProject}
        />
      )}
    </div>
  );
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function Dashboard({ onBannerClick }: { onBannerClick: () => void }) {
  const [openStep, setOpenStep] = useState<number | null>(0);
  const toggle = (i: number) => setOpenStep(openStep === i ? null : i);

  const steps: { label: string; done: boolean; content: React.ReactNode }[] = [
    { label: "Add an import", done: true, content: <StepAddImport /> },
    { label: "View imported data", done: true, content: <StepViewData /> },
    { label: "Set up your first channel", done: true, content: <StepSetupChannel /> },
    { label: "Activate your channel", done: false, content: <StepActivateChannel /> },
  ];

  return (
    <div className="flex-1 flex flex-col overflow-hidden" style={{ background: C.bg }}>
      {/* Top bar */}
      <PageHeader onBannerClick={onBannerClick} />

      {/* Content */}
      <div className="flex-1 overflow-auto" style={{ padding: "24px 32px" }}>
        <div className="flex items-center justify-between mb-5">
          <div>
            <h2 style={{ fontSize: 16, fontWeight: 500, color: C.fg, lineHeight: "24px" }}>Getting started</h2>
            <p style={{ fontSize: 14, color: C.muted, marginTop: 2 }}>Everything you need to set up Channable.</p>
          </div>
          <span style={{ fontSize: 12, color: C.muted, fontWeight: 500 }}>3 / 4 completed</span>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
          {steps.map((step, i) => {
            const isOpen = openStep === i;
            return (
              <div
                key={i}
                style={{
                  background: C.bg,
                  border: `1px solid ${isOpen && !step.done ? C.primary : C.border}`,
                  borderRadius: 4,
                  overflow: "hidden",
                }}
              >
                <button
                  onClick={() => toggle(i)}
                  className="w-full text-left flex items-center justify-between"
                  style={{ padding: "12px 16px", gap: 12, cursor: "pointer", background: "transparent" }}
                >
                  <div className="flex items-center gap-3">
                    <StepIndicator done={step.done} active={isOpen && !step.done} number={i + 1} />
                    <span
                      style={{
                        fontSize: 14,
                        fontWeight: isOpen ? 500 : 400,
                        color: step.done && !isOpen ? C.muted : C.fg,
                        textDecoration: step.done && !isOpen ? "line-through" : "none",
                      }}
                    >
                      {step.label}
                    </span>
                  </div>
                  <ChevronDown
                    size={14}
                    style={{
                      color: C.muted,
                      transform: isOpen ? "rotate(180deg)" : "rotate(0deg)",
                      transition: "transform 200ms",
                      flexShrink: 0,
                    }}
                  />
                </button>

                {isOpen && (
                  <div style={{ borderTop: `1px solid ${C.border}`, padding: "16px 16px 20px" }}>
                    {step.content}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function platformAbbr(name: string) {
  const words = name.split(" ");
  if (words.length === 1) return name.slice(0, 3).toUpperCase();
  return words.slice(0, 2).map((w) => w[0]).join("").toUpperCase();
}

// ─── Value page ───────────────────────────────────────────────────────────────
function ValuePage({ onBack, prefill }: { onBack: () => void; prefill?: MerchantPrefill | null }) {
  const [openStep, setOpenStep] = useState<number>(0);
  const [completedSteps, setCompletedSteps] = useState<Set<number>>(new Set());
  // [ADDED] pre-select the import tile from the detected CMS (Merchant API mock)
  const [importOption, setImportOption] = useState<ImportOption>(prefill ? cmsToPlatform(prefill.cms) : null);
  const [configOption, setConfigOption] = useState<string | null>(null);

  const toggle = (i: number) => setOpenStep(openStep === i ? -1 : i);

  const complete = (i: number) => {
    setCompletedSteps((prev) => new Set([...prev, i]));
    setOpenStep(i + 1);
  };

  const steps: { label: string; icon: React.ReactNode; content: React.ReactNode }[] = [
    {
      label: "Import data",
      icon: <Database size={14} />,
      content: (
        <div>
          <ImportPicker selected={importOption} onSelect={setImportOption} />
          <div style={{ marginTop: 12 }}><FreeNotice /></div>
          <button
            onClick={() => importOption && complete(0)}
            disabled={!importOption}
            style={{ ...btn.primary, opacity: importOption ? 1 : 0.45, cursor: importOption ? "pointer" : "not-allowed", marginTop: 16 }}
          >
            Continue <ArrowRight size={13} />
          </button>
        </div>
      ),
    },
    {
      label: "Configure your feed",
      icon: <Radio size={14} />,
      content: (
        <div>
          <p style={{ fontSize: 14, color: C.muted, marginBottom: 12 }}>
            Map your product attributes and set transformation rules.
          </p>
          <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 16 }}>
            {["Use default mapping (recommended)", "Custom field mapping", "Import mapping from template"].map((opt) => (
              <button
                key={opt}
                onClick={() => setConfigOption(opt)}
                className="flex items-center gap-3 text-left"
                style={{
                  padding: "10px 12px",
                  border: `1px solid ${configOption === opt ? C.primary : C.border}`,
                  borderRadius: 4,
                  background: configOption === opt ? "#e8f5fb" : C.bg,
                  fontSize: 14,
                  color: configOption === opt ? "#0a7aad" : C.fg,
                  cursor: "pointer",
                  boxShadow: C.btnShadow,
                }}
              >
                <RadioDot selected={configOption === opt} />
                {opt}
              </button>
            ))}
          </div>
          <button
            onClick={() => configOption && complete(1)}
            disabled={!configOption}
            style={{ ...btn.primary, opacity: configOption ? 1 : 0.45, cursor: configOption ? "pointer" : "not-allowed" }}
          >
            Continue <ArrowRight size={13} />
          </button>
        </div>
      ),
    },
    {
      label: "Publish to channels",
      icon: <Play size={14} />,
      content: (
        <div>
          <p style={{ fontSize: 14, color: C.muted, marginBottom: 12 }}>
            Select the channels where you want to distribute your products.
          </p>
          <BillingNotice />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 16, marginTop: 16 }}>
            {["Google Shopping", "Meta Ads", "Amazon", "TikTok Shop", "Pinterest", "Bing Shopping"].map((ch) => (
              <label
                key={ch}
                className="flex items-center gap-2"
                style={{
                  padding: "10px 12px",
                  border: `1px solid ${C.border}`,
                  borderRadius: 4,
                  fontSize: 14,
                  color: C.fg,
                  cursor: "pointer",
                  boxShadow: C.btnShadow,
                  background: C.bg,
                }}
              >
                <input type="checkbox" defaultChecked={prefill?.channel === ch} style={{ accentColor: C.primary, width: 14, height: 14 }} />
                {ch}
              </label>
            ))}
          </div>
          <button onClick={() => complete(2)} style={btn.primary}>
            Publish <Play size={12} />
          </button>
        </div>
      ),
    },
  ];

  const allDone = completedSteps.size === steps.length;

  return (
    <div className="flex-1 flex flex-col overflow-hidden" style={{ background: C.bg }}>
      {/* Top bar */}
      <div
        className="flex items-center justify-between shrink-0"
        style={{ padding: "16px 24px", height: 72, boxShadow: `inset 0px -1px 0px ${C.headerDivider}` }}
      >
        <button
          onClick={onBack}
          className="flex items-center gap-1.5"
          style={{ color: C.muted, fontSize: 14, cursor: "pointer", background: "none", border: "none" }}
        >
          <ChevronLeft size={14} />
          Back to imports
        </button>
        <button
          onClick={onBack}
          style={{ ...btn.base, padding: "8px 12px" }}
        >
          <X size={14} style={{ color: C.muted }} />
        </button>
      </div>

      {/* Content */}
      <div className="flex-1 overflow-auto" style={{ padding: "32px 40px" }}>
        <div style={{ maxWidth: 640 }}>
          {allDone ? (
            <div style={{ textAlign: "center", padding: "48px 0" }}>
              <div style={{ width: 52, height: 52, borderRadius: "50%", background: "#dcfce7", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px" }}>
                <Check size={26} style={{ color: "#16a34a" }} strokeWidth={2.5} />
              </div>
              <h2 style={{ fontSize: 20, fontWeight: 500, color: C.fg, marginBottom: 8 }}>You"re all set!</h2>
              <p style={{ fontSize: 14, color: C.muted, marginBottom: 24 }}>Your product catalog is imported and ready to publish.</p>
              <button onClick={onBack} style={btn.primary}>Go to imports</button>
            </div>
          ) : (
            <>
              <div style={{ marginBottom: 24 }}>
                <p style={{ fontSize: 12, color: C.muted, fontWeight: 500, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 4 }}>Setup wizard</p>
                <h2 style={{ fontSize: 20, fontWeight: 500, color: C.fg, marginBottom: 4 }}>Add an import</h2>
                <p style={{ fontSize: 14, color: C.muted }}>Complete the steps below to start importing your product data.</p>
              </div>

              {/* [ADDED] Merchant API detection notice + pre-fill summary */}
              {prefill && <DetectionNotice projectName={prefill.projectName} cms={prefill.cms} />}

              <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                {steps.map((step, i) => {
                  const isDone = completedSteps.has(i);
                  const isOpen = openStep === i;
                  const isLocked = i > 0 && !completedSteps.has(i - 1);

                  return (
                    <div
                      key={i}
                      style={{
                        border: `1px solid ${isOpen && !isDone ? C.primary : C.border}`,
                        borderRadius: 4,
                        overflow: "hidden",
                        opacity: isLocked ? 0.45 : 1,
                        background: C.bg,
                      }}
                    >
                      <button
                        onClick={() => !isLocked && toggle(i)}
                        disabled={isLocked}
                        className="w-full text-left flex items-center justify-between"
                        style={{ padding: "12px 16px", cursor: isLocked ? "default" : "pointer", background: "transparent" }}
                      >
                        <div className="flex items-center gap-3">
                          <StepIndicator done={isDone} active={isOpen && !isDone} number={i + 1} />
                          <span style={{ color: C.muted, display: "flex", alignItems: "center" }}>{step.icon}</span>
                          <span
                            style={{
                              fontSize: 14,
                              fontWeight: isOpen ? 500 : 400,
                              color: isDone && !isOpen ? C.muted : C.fg,
                              textDecoration: isDone && !isOpen ? "line-through" : "none",
                            }}
                          >
                            {step.label}
                          </span>
                          {isDone && (
                            <span style={{ padding: "1px 8px", borderRadius: 40, background: "#dcfce7", color: "#15803d", fontSize: 12, fontWeight: 500 }}>
                              Done
                            </span>
                          )}
                        </div>
                        <ChevronDown
                          size={14}
                          style={{
                            color: C.muted,
                            transform: isOpen ? "rotate(180deg)" : "rotate(0deg)",
                            transition: "transform 200ms",
                            flexShrink: 0,
                          }}
                        />
                      </button>

                      {isOpen && (
                        <div style={{ borderTop: `1px solid ${C.border}`, padding: "16px 16px 20px" }}>
                          {step.content}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// (productstatuses, resolution: merchant_action). Only issues Core's rules engine
// can actually fix are listed — policy violations are excluded. The dashboard and
// exports inline hints pick a random one on every page load.
const CORE_FIXABLE_ISSUES = [
  { label: "a missing required attribute", attr: "gtin", fix: "map it from your barcode field with a rule" },
  { label: "an image that is too small", attr: "image_link", fix: "swap to a larger image variant" },
  { label: "a price mismatch with the landing page", attr: "price", fix: "keep price in sync automatically" },
  { label: "a missing attribute for its product type", attr: "color", fix: "fill it from your data" },
  { label: "an availability mismatch", attr: "availability", fix: "keep availability in sync" },
  { label: "a generic image", attr: "image_link", fix: "replace placeholder images" },
  { label: "a missing related attribute", attr: "size", fix: "derive it with a rule" },
  { label: "an invalid attribute value", attr: "condition", fix: "normalise the value" },
  { label: "no shipping service defined", attr: "shipping", fix: "set shipping with a rule" },
  { label: "an attribute value that is too long", attr: "title", fix: "trim it with a rule" },
  { label: "a missing required sub-attribute", attr: "product_detail", fix: "complete it with a rule" },
  { label: "an invalid enum value", attr: "size_type", fix: "map it to a valid value" },
];
function pickIssue() {
  const it = CORE_FIXABLE_ISSUES[Math.floor(Math.random() * CORE_FIXABLE_ISSUES.length)];
  const count = 20 + Math.floor(Math.random() * 580); // randomised so the hint changes on every refresh
  return { ...it, count };
}

// SVG donut split by value, hollow center, thin white gaps.
function CssDonut({ data, size = 132, thickness = 24 }: { data: { value: number; color: string }[]; size?: number; thickness?: number }) {
  const total = data.reduce((s, d) => s + d.value, 0) || 1;
  const r = (size - thickness) / 2, cx = size / 2, cy = size / 2, circ = 2 * Math.PI * r;
  let off = 0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform: "rotate(-90deg)", flexShrink: 0 }}>
      {data.map((d, i) => {
        const len = (d.value / total) * circ;
        const el = <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.color} strokeWidth={thickness} strokeDasharray={`${Math.max(len - 2, 0)} ${circ}`} strokeDashoffset={-off} />;
        off += len;
        return el;
      })}
    </svg>
  );
}

// Smooth SVG area chart (ROAS over 30 days)
function AreaChart() {
  const series = [100, 112, 150, 120, 165, 135, 178, 150, 200, 162, 138, 120, 152, 178, 210, 150, 128, 176, 232, 182, 158, 208, 252, 198, 332, 262, 150, 182, 300, 270];
  const w = 1080, h = 200, padL = 34, padB = 24, padT = 8, max = 400;
  const innerW = w - padL, innerH = h - padB - padT;
  const x = (i: number) => padL + (i / (series.length - 1)) * innerW;
  const y = (v: number) => padT + innerH - (v / max) * innerH;
  let dPath = `M ${x(0)} ${y(series[0])}`;
  for (let i = 1; i < series.length; i++) {
    const xc = (x(i - 1) + x(i)) / 2;
    dPath += ` Q ${x(i - 1)} ${y(series[i - 1])} ${xc} ${(y(series[i - 1]) + y(series[i])) / 2} Q ${x(i)} ${y(series[i])} ${x(i)} ${y(series[i])}`;
  }
  const area = `${dPath} L ${x(series.length - 1)} ${padT + innerH} L ${padL} ${padT + innerH} Z`;
  const ticks = [0, 100, 200, 300, 400];
  const labels = ["12 may", "14 may", "16 may", "18 may", "20 may", "22 may", "24 may", "26 may", "28 may", "30 may", "01 jun", "03 jun", "05 jun", "07 jun"];
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h} preserveAspectRatio="none">
      <defs>
        <linearGradient id="roasFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stopColor="#109CD9" stopOpacity="0.18" />
          <stop offset="1" stopColor="#109CD9" stopOpacity="0" />
        </linearGradient>
      </defs>
      {ticks.map((t) => (
        <g key={t}>
          <line x1={padL} y1={y(t)} x2={w} y2={y(t)} stroke="#EDEFF3" strokeWidth="1" />
          <text x={padL - 8} y={y(t) + 4} textAnchor="end" fontSize="11" fill="#94A1B2">{t}</text>
        </g>
      ))}
      <path d={area} fill="url(#roasFill)" />
      <path d={dPath} fill="none" stroke="#109CD9" strokeWidth="2" />
      {labels.map((lb, i) => (
        <text key={lb} x={padL + (i / (labels.length - 1)) * innerW} y={h - 5} textAnchor="middle" fontSize="11" fill="#94A1B2">{lb}</text>
      ))}
    </svg>
  );
}

// Small SVG area chart used inside the product drawer.
function MiniArea({ series, height = 130 }: { series: number[]; height?: number }) {
  const w = 420, padL = 30, padB = 22, padT = 6, max = Math.max(...series, 1);
  const innerW = w - padL, innerH = height - padB - padT;
  const x = (i: number) => padL + (i / (series.length - 1)) * innerW;
  const y = (v: number) => padT + innerH - (v / max) * innerH;
  let dPath = `M ${x(0)} ${y(series[0])}`;
  for (let i = 1; i < series.length; i++) {
    const xc = (x(i - 1) + x(i)) / 2;
    dPath += ` Q ${x(i - 1)} ${y(series[i - 1])} ${xc} ${(y(series[i - 1]) + y(series[i])) / 2} Q ${x(i)} ${y(series[i])} ${x(i)} ${y(series[i])}`;
  }
  const area = `${dPath} L ${x(series.length - 1)} ${padT + innerH} L ${padL} ${padT + innerH} Z`;
  const ticks = [0, max / 2, max];
  return (
    <svg viewBox={`0 0 ${w} ${height}`} width="100%" height={height} preserveAspectRatio="none">
      <defs><linearGradient id="miniFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor="#109CD9" stopOpacity="0.18" /><stop offset="1" stopColor="#109CD9" stopOpacity="0" /></linearGradient></defs>
      {ticks.map((t) => (
        <g key={t}><line x1={padL} y1={y(t)} x2={w} y2={y(t)} stroke="#EDEFF3" strokeWidth="1" /><text x={padL - 6} y={y(t) + 4} textAnchor="end" fontSize="10" fill="#94A1B2">{Math.round(t)}</text></g>
      ))}
      <path d={area} fill="url(#miniFill)" /><path d={dPath} fill="none" stroke="#109CD9" strokeWidth="2" />
    </svg>
  );
}

// CSS Merchants tool shell: sidebar + top bar + sub-header/tabs + page content.
function CssMerchantsTool({ onCta }: { onCta: () => void }) {
  const [tab, setTab] = useState<CssTab>("dashboard");
  const [drawerProduct, setDrawerProduct] = useState<any>(null);
  return (
    <>
      <CssSidebar />
      <div className="flex-1 flex flex-col min-w-0 overflow-hidden">
        <CssTopBar />
        <CssSubHeader tab={tab} setTab={setTab} onCopy={onCta} />
        <div className="flex-1 overflow-auto" style={{ padding: "24px", background: C.subtle }}>
          {tab === "dashboard" && <CssDashboardPage onCta={onCta} />}
          {tab === "products" && <CssProductsPage onCta={onCta} onSelect={setDrawerProduct} />}
          {tab === "labelizer" && <CssLabelizerPage onCta={onCta} />}
          {tab === "exports" && <CssExportsPage onCta={onCta} />}
        </div>
      </div>
      {drawerProduct && <CssProductDrawer product={drawerProduct} onClose={() => setDrawerProduct(null)} onCta={onCta} />}
    </>
  );
}

// Storylane interactive tour modal. Opened by every conversion CTA.
function StorylaneModal({ onClose, onGetStarted }: { onClose: () => void; onGetStarted: () => void }) {
  // Load Storylane's embed loader once (handles resize + the demo runtime).
  useEffect(() => {
    if (!document.getElementById("sl-loader")) {
      const sc = document.createElement("script");
      sc.id = "sl-loader";
      sc.src = STORYLANE_LOADER;
      sc.async = true;
      document.body.appendChild(sc);
    }
  }, []);

  return (
    <ModalShell onClose={onClose} width={860}>
      {/* Header */}
      <div
        className="flex items-center justify-between shrink-0"
        style={{ padding: "14px 20px", borderBottom: `1px solid ${C.border}` }}
      >
        <div className="flex items-center gap-2">
          <Play size={15} style={{ color: C.primary }} />
          <span style={{ fontSize: 15, fontWeight: 500, color: C.fg }}>See how Channable works</span>
          <span
            style={{ padding: "1px 8px", borderRadius: 40, background: "#dcfce7", color: "#15803d", fontSize: 12, fontWeight: 500 }}
          >
            No signup required
          </span>
        </div>
        <button onClick={onClose} aria-label="Close" style={{ ...btn.base, padding: 8, boxShadow: "none", border: "none", background: "transparent" }}>
          <X size={18} style={{ color: C.muted }} />
        </button>
      </div>

      {/* Storylane embed (interactive tour). Fallback link opens the share page in a new tab. */}
      <div style={{ position: "relative", height: 470, background: "#EEF1F5" }}>
        <iframe
          className="sl-demo"
          src={STORYLANE_EMBED_URL}
          title="Channable product tour"
          allow="fullscreen; clipboard-write"
          referrerPolicy="origin"
          style={{ width: "100%", height: "100%", border: "none", display: "block" }}
        />
        <a
          href={STORYLANE_URL}
          target="_blank"
          rel="noopener noreferrer"
          style={{ ...btn.base, position: "absolute", bottom: 12, right: 12, padding: "6px 10px", fontSize: 12, textDecoration: "none", color: C.muted }}
        >
          Open the tour in a new tab <ArrowRight size={12} />
        </a>
      </div>

      {/* Footer CTA */}
      <div
        className="flex items-center justify-between shrink-0"
        style={{ padding: "14px 20px", borderTop: `1px solid ${C.border}` }}
      >
        <span style={{ fontSize: 13, color: C.muted }}>Take the tour, then start in a few clicks.</span>
        <button onClick={onGetStarted} style={btn.primary}>
          Get started <ArrowRight size={13} />
        </button>
      </div>
    </ModalShell>
  );
}

// "Create project" popup shown after the tour. Pre-fills name/CMS/channel from the Merchant API mock,
// then routes into the existing guided onboarding ValuePage.
function CreateProjectModal({
  prefill,
  onClose,
  onCreate,
}: {
  prefill: MerchantPrefill;
  onClose: () => void;
  onCreate: () => void;
}) {
  const [name, setName] = useState(prefill.projectName);

  const fieldRow = (label: string, node: React.ReactNode) => (
    <div style={{ marginBottom: 16 }}>
      <p style={{ fontSize: 12, fontWeight: 500, color: C.muted, marginBottom: 6 }}>{label}</p>
      {node}
    </div>
  );

  return (
    <ModalShell onClose={onClose} width={480}>
      {/* Header */}
      <div
        className="flex items-center justify-between shrink-0"
        style={{ padding: "16px 20px", borderBottom: `1px solid ${C.border}` }}
      >
        <span style={{ fontSize: 16, fontWeight: 500, color: C.fg }}>Create your project</span>
        <button onClick={onClose} aria-label="Close" style={{ ...btn.base, padding: 8, boxShadow: "none", border: "none", background: "transparent" }}>
          <X size={18} style={{ color: C.muted }} />
        </button>
      </div>

      {/* Body */}
      <div style={{ padding: 20, overflow: "auto" }}>
        <DetectionNotice projectName={prefill.projectName} cms={prefill.cms} />

        <div style={{ marginTop: 16 }}>
          {fieldRow(
            "Project name",
            <input
              value={name}
              onChange={(e) => setName(e.target.value)}
              style={{
                width: "100%",
                padding: "10px 12px",
                border: `1px solid ${C.border}`,
                borderRadius: 4,
                fontSize: 14,
                color: C.fg,
                outline: "none",
                boxShadow: C.btnShadow,
              }}
            />
          )}

          {fieldRow(
            "Detected source",
            <div
              className="flex items-center gap-2"
              style={{ padding: "10px 12px", border: `1px solid ${C.primary}`, borderRadius: 4, background: "#e8f5fb", fontSize: 14, color: "#0a7aad" }}
            >
              <Database size={14} />
              <span style={{ flex: 1 }}>{prefill.cms}</span>
              <span style={{ padding: "1px 8px", borderRadius: 40, background: "#bae6fd", color: "#0a7aad", fontSize: 11, fontWeight: 500 }}>
                pre-selected
              </span>
            </div>
          )}

          {fieldRow(
            "Channel",
            <div
              className="flex items-center gap-2"
              style={{ padding: "10px 12px", border: `1px solid ${C.primary}`, borderRadius: 4, background: "#e8f5fb", fontSize: 14, color: "#0a7aad" }}
            >
              <ShoppingCart size={14} />
              <span style={{ flex: 1 }}>{prefill.channel}</span>
              <span style={{ padding: "1px 8px", borderRadius: 40, background: "#bae6fd", color: "#0a7aad", fontSize: 11, fontWeight: 500 }}>
                pre-selected
              </span>
            </div>
          )}
        </div>

        <FreeNotice />
      </div>

      {/* Footer */}
      <div
        className="flex items-center justify-between shrink-0"
        style={{ padding: "14px 20px", borderTop: `1px solid ${C.border}` }}
      >
        <button onClick={onClose} style={{ ...btn.base, background: "transparent", boxShadow: "none", border: "none", color: C.muted }}>
          Cancel
        </button>
        <button onClick={onCreate} disabled={!name.trim()} style={{ ...btn.primary, opacity: name.trim() ? 1 : 0.45 }}>
          Create project <ArrowRight size={13} />
        </button>
      </div>
    </ModalShell>
  );
}

// Merchant API detection notice shown in the Create project popup and the guided onboarding.
function DetectionNotice({ projectName, cms }: { projectName: string; cms: string }) {
  return (
    <div
      className="flex items-start gap-2"
      style={{ padding: "10px 12px", background: "#eff6ff", border: `1px solid #bfdbfe`, borderRadius: 4 }}
    >
      <Info size={14} style={{ color: C.primary, flexShrink: 0, marginTop: 1 }} />
      <p style={{ fontSize: 13, color: "#1e40af", lineHeight: "18px" }}>
        <strong style={{ fontWeight: 600 }}>We detected you're on {cms}.</strong> We've pre-filled your import
        settings for <strong style={{ fontWeight: 600 }}>{projectName}</strong> — you can change this if needed.
      </p>
    </div>
  );
}
