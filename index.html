<script type="text/plain" id="appsrc">
type View = "dashboard" | "value-page";
type ImportOption = string | null;

// ─── [ADDED] Merchant API mock + CSS→Core cross-sell config ───────────────────
// Storylane interactive tour shown by every conversion CTA before commitment.
// Share page (standalone, opens in a new tab as a guaranteed fallback):
const STORYLANE_URL =
  "https://democenter.channable.com/share/tk7rwmo5fdfk?email=cher%20utilisateur%20de%20Channable";
// Embeddable demo URL (used inside the iframe) + loader script:
const STORYLANE_EMBED_URL =
  "https://democenter.channable.com/demo/tk7rwmo5fdfk?embed=inline&email=cher%20utilisateur%20de%20Channable";
const STORYLANE_LOADER = "https://js.storylane.io/js/v1/storylane.js";

// Shape of the (mock) data we pull from the Merchant API to pre-fill onboarding.
type MerchantPrefill = {
  projectName: string; // pre-fills the project name
  cms: string;         // detected CMS (display label)
  channel: string;     // channel to pre-select in the publish step
};

const MOCK_PROJECT_NAMES = ["Chamazon", "SportGear NL", "TechStore EU"];
const MOCK_CMS = ["Shopify", "WooCommerce", "Magento", "Lightspeed"];

function pickRandom<T>(arr: T[]): T {
  return arr[Math.floor(Math.random() * arr.length)];
}

// Returns randomized mock merchant data, as if returned by the Merchant API.
function mockMerchantApi(): MerchantPrefill {
  return {
    projectName: pickRandom(MOCK_PROJECT_NAMES),
    cms: pickRandom(MOCK_CMS),
    channel: "Google Shopping",
  };
}

// Maps a detected CMS label to the matching ImportPicker tile name so it can be pre-selected.
function cmsToPlatform(cms: string): string {
  const map: Record<string, string> = {
    Shopify: "Shopify Markets",
    WooCommerce: "WooCommerce",
    Magento: "Magento",
    Lightspeed: "Lightspeed",
  };
  return map[cms] ?? cms;
}
// ──────────────────────────────────────────────────────────────────────────────

// ─── Design tokens (matches Channable CSS spec) ───────────────────────────────

  subtle: "#F3F5F6",
  headerDivider: "#E8E9EE",

const btn = {

    display: "flex" as const,
    alignItems: "center" as const,

    background: C.bg,

    fontWeight: 500,

    boxShadow: C.btnShadow,
    borderRadius: 4,
    color: C.primary,
    padding: "10px 16px",

    fontWeight: 500,

function App() {
  const [view, setView] = useState<View>("dashboard");

  // ─── [ADDED] CSS→Core cross-sell flow state ────────────────────────────────
  const [storylaneOpen, setStorylaneOpen] = useState(false);     // Storylane tour modal
  const [createProjectOpen, setCreateProjectOpen] = useState(false); // "Create project" popup
  const [prefill, setPrefill] = useState<MerchantPrefill | null>(null); // mock Merchant API data

  // Every conversion surface CTA funnels through here → opens the Storylane tour first.
  const openStorylane = () => setStorylaneOpen(true);

  // "Get started" inside the tour → close tour, fetch mock data, open the Create project popup.
  const handleGetStarted = () => {
    setStorylaneOpen(false);
    setPrefill(mockMerchantApi());
    setCreateProjectOpen(true);
  };

  // Confirm in the Create project popup → close it and enter the guided onboarding (ValuePage).
  const handleCreateProject = () => {
    setCreateProjectOpen(false);
    setView("value-page");
  };
  // ────────────────────────────────────────────────────────────────────────────

  return (
    <div className="flex h-screen overflow-hidden" style={{ fontFamily: "'Inter', sans-serif", fontSize: 14 }}>
      <Sidebar />
      <div className="flex-1 flex flex-col min-w-0 overflow-hidden">
        {view === "dashboard"
          ? <Dashboard onBannerClick={openStorylane} />
          : <ValuePage onBack={() => setView("dashboard")} prefill={prefill} />
        }
      </div>

      {/* ─── [ADDED] CSS→Core cross-sell overlays ─────────────────────────────── */}
      {storylaneOpen && (
        <StorylaneModal onClose={() => setStorylaneOpen(false)} onGetStarted={handleGetStarted} />
      )}
      {createProjectOpen && prefill && (
        <CreateProjectModal
          prefill={prefill}
          onClose={() => setCreateProjectOpen(false)}
          onCreate={handleCreateProject}
        />
      )}
    </div>
  );
}

}

  return (
    <div className="flex items-center gap-2.5">
      <svg width="18" height="21" viewBox="0 0 18 21" fill="none">

        <rect x="6" y="9" width="6" height="6" fill="#E13A8C" />

// ─── Dashboard ────────────────────────────────────────────────────────────────
function Dashboard({ onBannerClick }: { onBannerClick: () => void }) {
  const [openStep, setOpenStep] = useState<number | null>(0);
  const toggle = (i: number) => setOpenStep(openStep === i ? null : i);

  const steps: { label: string; done: boolean; content: React.ReactNode }[] = [
    { label: "Add an import", done: true, content: <StepAddImport /> },
    { label: "View imported data", done: true, content: <StepViewData /> },
    { label: "Set up your first channel", done: true, content: <StepSetupChannel /> },
    { label: "Activate your channel", done: false, content: <StepActivateChannel /> },
  ];

  return (
    <div className="flex-1 flex flex-col overflow-hidden" style={{ background: C.bg }}>
      {/* Top bar */}
      <PageHeader onBannerClick={onBannerClick} />

      {/* Content */}
      <div className="flex-1 overflow-auto" style={{ padding: "24px 32px" }}>
        <div className="flex items-center justify-between mb-5">
          <div>
            <h2 style={{ fontSize: 16, fontWeight: 500, color: C.fg, lineHeight: "24px" }}>Getting started</h2>
            <p style={{ fontSize: 14, color: C.muted, marginTop: 2 }}>Everything you need to set up Channable.</p>
          </div>
          <span style={{ fontSize: 12, color: C.muted, fontWeight: 500 }}>3 / 4 completed</span>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
          {steps.map((step, i) => {
            const isOpen = openStep === i;
            return (
              <div
                key={i}
                style={{
                  background: C.bg,
                  border: `1px solid ${isOpen && !step.done ? C.primary : C.border}`,
                  borderRadius: 4,
                  overflow: "hidden",
                }}
              >
                <button
                  onClick={() => toggle(i)}
                  className="w-full text-left flex items-center justify-between"
                  style={{ padding: "12px 16px", gap: 12, cursor: "pointer", background: "transparent" }}
                >
                  <div className="flex items-center gap-3">
                    <StepIndicator done={step.done} active={isOpen && !step.done} number={i + 1} />
                    <span
                      style={{
                        fontSize: 14,
                        fontWeight: isOpen ? 500 : 400,
                        color: step.done && !isOpen ? C.muted : C.fg,
                        textDecoration: step.done && !isOpen ? "line-through" : "none",
                      }}
                    >
                      {step.label}
                    </span>
                  </div>
                  <ChevronDown
                    size={14}
                    style={{
                      color: C.muted,
                      transform: isOpen ? "rotate(180deg)" : "rotate(0deg)",
                      transition: "transform 200ms",
                      flexShrink: 0,
                    }}
                  />
                </button>

                {isOpen && (
                  <div style={{ borderTop: `1px solid ${C.border}`, padding: "16px 16px 20px" }}>
                    {step.content}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

      {/* Breadcrumb row */}
      <div
        className="flex items-center justify-between"

      >

            <Bell size={14} style={{ color: C.muted }} />

        </div>

      {/* Title bar + banner */}
      <div style={{ background: C.bg, boxShadow: `inset 0px -1px 0px ${C.headerDivider}` }}>
        <div className="flex items-center justify-between" style={{ padding: "12px 24px", height: 64 }}>
          <div className="flex items-center gap-3">
            <span style={{ fontSize: 16, fontWeight: 500, color: C.fg }}>Imports</span>
          </div>
          <div className="flex items-center gap-2">
            <button style={btn.base}>
              <Tag size={14} style={{ color: C.muted }} />

            <button style={btn.outline} onClick={onBannerClick}>
              <Database size={14} />

            </button>
          </div>
        </div>

    </div>

}

function StepIndicator({ done, active, number }: { done: boolean; active: boolean; number: number }) {
  return (
    <div
      style={{
        width: 20,
        height: 20,
        borderRadius: "50%",
        flexShrink: 0,
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        background: done ? "#22c55e" : active ? C.primary : C.subtle,
        border: done || active ? "none" : `1.5px solid ${C.border}`,
        fontSize: 11,
        fontWeight: 600,
        color: done || active ? "#fff" : C.muted,
      }}
    >
      {done ? <Check size={11} strokeWidth={3} /> : number}
    </div>
  );
}

// ─── Step content components ──────────────────────────────────────────────────
function StepAddImport() {
  const [selected, setSelected] = useState<ImportOption>(null);
  return (
    <div>
      <ImportPicker selected={selected} onSelect={setSelected} />
      <div style={{ marginTop: 12 }}><FreeNotice /></div>
      <button
        disabled={!selected}
        style={{ ...btn.primary, opacity: selected ? 1 : 0.45, cursor: selected ? "pointer" : "not-allowed", marginTop: 16 }}
      >
        Continue <ArrowRight size={13} />
      </button>
    </div>
  );
}

function platformAbbr(name: string) {
  const words = name.split(" ");
  if (words.length === 1) return name.slice(0, 3).toUpperCase();
  return words.slice(0, 2).map((w) => w[0]).join("").toUpperCase();
}

function ImportPicker({ selected, onSelect }: { selected: ImportOption; onSelect: (v: string) => void }) {
  return (
    <div>
      <div style={{ marginBottom: 4 }}>
        <p style={{ fontSize: 14, fontWeight: 500, color: C.fg }}>Import from website</p>
        <p style={{ fontSize: 13, color: C.muted, marginTop: 2, lineHeight: "18px" }}>
          Connect directly to your website via an app or API. Your product data is sent to Channable in real time — no file uploads or manual syncing needed.
        </p>
      </div>

      <div style={{ marginTop: 16 }}>
        <p style={{ fontSize: 12, fontWeight: 500, color: C.muted, marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.06em" }}>
          Via a platform
        </p>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 6 }}>
          {PLATFORMS.map((p) => (
            <PlatformTile key={p.name} name={p.name} color={p.color} selected={selected === p.name} onSelect={() => onSelect(p.name)} />

      </div>

      <div style={{ marginTop: 16 }}>
        <p style={{ fontSize: 12, fontWeight: 500, color: C.muted, marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.06em" }}>
          Via a data file

        <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 6 }}>

            <PlatformTile key={p.name} name={p.name} color={p.color} selected={selected === p.name} onSelect={() => onSelect(p.name)} />
          ))}
        </div>
      </div>
    </div>
  );
}

function PlatformTile({ name, color, selected, onSelect }: { name: string; color: string; selected: boolean; onSelect: () => void }) {
  return (
    <button
      onClick={onSelect}
      title={name}
      style={{
        display: "flex",
        flexDirection: "column",
        alignItems: "center",
        gap: 6,
        padding: "10px 6px 8px",
        border: `1px solid ${selected ? C.primary : C.border}`,
        borderRadius: 4,
        background: selected ? "#e8f5fb" : C.bg,
        cursor: "pointer",
        boxShadow: selected ? `0 0 0 2px rgba(16,156,217,0.15)` : C.btnShadow,
        transition: "border-color 120ms, background 120ms",
      }}
    >
      <div
        style={{
          width: 32,
          height: 32,
          borderRadius: 6,
          background: color,
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          fontSize: 10,
          fontWeight: 700,
          color: "#fff",
          letterSpacing: "0.02em",
          flexShrink: 0,
        }}
      >
        {platformAbbr(name)}
      </div>
      <span style={{
        fontSize: 11,
        color: selected ? "#0a7aad" : C.fg,
        fontWeight: selected ? 500 : 400,
        textAlign: "center",
        lineHeight: "14px",
        overflow: "hidden",
        display: "-webkit-box",
        WebkitLineClamp: 2,
        WebkitBoxOrient: "vertical" as const,
      }}>
        {name}
      </span>
    </button>
  );
}

function StepViewData() {
  const rows = [
    { name: "Running shoes ProMax", sku: "RS-001", price: "€129.99", status: "active" },
    { name: "Trail Blazer Jacket", sku: "TBJ-042", price: "€89.50", status: "active" },
    { name: "Hydration Pack 2L", sku: "HP-007", price: "€44.99", status: "pending" },
    { name: "Compression Socks Set", sku: "CSS-19", price: "€19.95", status: "active" },
  ];
  return (
    <div>
      <p style={{ fontSize: 14, color: C.muted, marginBottom: 12 }}>Your imported product catalog is ready for channel distribution.</p>
      <div style={{ border: `1px solid ${C.border}`, borderRadius: 4, overflow: "hidden", marginBottom: 12 }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
          <thead>
            <tr style={{ background: C.subtle }}>
              {["Product", "SKU", "Price", "Status"].map((h) => (
                <th key={h} style={{ textAlign: "left", padding: "8px 12px", fontWeight: 500, color: C.muted, borderBottom: `1px solid ${C.border}` }}>{h}</th>
              ))}
            </tr>
          </thead>

// ─── Value page ───────────────────────────────────────────────────────────────
function ValuePage({ onBack, prefill }: { onBack: () => void; prefill?: MerchantPrefill | null }) {
  const [openStep, setOpenStep] = useState<number>(0);
  const [completedSteps, setCompletedSteps] = useState<Set<number>>(new Set());
  // [ADDED] pre-select the import tile from the detected CMS (Merchant API mock)
  const [importOption, setImportOption] = useState<ImportOption>(prefill ? cmsToPlatform(prefill.cms) : null);
  const [configOption, setConfigOption] = useState<string | null>(null);

  const toggle = (i: number) => setOpenStep(openStep === i ? -1 : i);

  const complete = (i: number) => {
    setCompletedSteps((prev) => new Set([...prev, i]));
    setOpenStep(i + 1);
  };

  const steps: { label: string; icon: React.ReactNode; content: React.ReactNode }[] = [
    {
      label: "Import data",
      icon: <Database size={14} />,
      content: (
        <div>
          <ImportPicker selected={importOption} onSelect={setImportOption} />
          <div style={{ marginTop: 12 }}><FreeNotice /></div>
          <button
            onClick={() => importOption && complete(0)}
            disabled={!importOption}
            style={{ ...btn.primary, opacity: importOption ? 1 : 0.45, cursor: importOption ? "pointer" : "not-allowed", marginTop: 16 }}
          >
            Continue <ArrowRight size={13} />
          </button>
        </div>
      ),
    },
    {
      label: "Configure your feed",
      icon: <Radio size={14} />,
      content: (
        <div>
          <p style={{ fontSize: 14, color: C.muted, marginBottom: 12 }}>
            Map your product attributes and set transformation rules.
          </p>
          <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 16 }}>
            {["Use default mapping (recommended)", "Custom field mapping", "Import mapping from template"].map((opt) => (
              <button
                key={opt}
                onClick={() => setConfigOption(opt)}
                className="flex items-center gap-3 text-left"
                style={{
                  padding: "10px 12px",
                  border: `1px solid ${configOption === opt ? C.primary : C.border}`,
                  borderRadius: 4,
                  background: configOption === opt ? "#e8f5fb" : C.bg,
                  fontSize: 14,
                  color: configOption === opt ? "#0a7aad" : C.fg,
                  cursor: "pointer",
                  boxShadow: C.btnShadow,
                }}
              >
                <RadioDot selected={configOption === opt} />
                {opt}
              </button>
            ))}
          </div>
          <button
            onClick={() => configOption && complete(1)}
            disabled={!configOption}
            style={{ ...btn.primary, opacity: configOption ? 1 : 0.45, cursor: configOption ? "pointer" : "not-allowed" }}
          >
            Continue <ArrowRight size={13} />
          </button>
        </div>
      ),
    },
    {
      label: "Publish to channels",
      icon: <Play size={14} />,
      content: (
        <div>
          <p style={{ fontSize: 14, color: C.muted, marginBottom: 12 }}>
            Select the channels where you want to distribute your products.
          </p>
          <BillingNotice />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 16, marginTop: 16 }}>
            {["Google Shopping", "Meta Ads", "Amazon", "TikTok Shop", "Pinterest", "Bing Shopping"].map((ch) => (
              <label
                key={ch}
                className="flex items-center gap-2"
                style={{
                  padding: "10px 12px",
                  border: `1px solid ${C.border}`,
                  borderRadius: 4,
                  fontSize: 14,
                  color: C.fg,
                  cursor: "pointer",
                  boxShadow: C.btnShadow,
                  background: C.bg,
                }}
              >
                <input type="checkbox" defaultChecked={prefill?.channel === ch} style={{ accentColor: C.primary, width: 14, height: 14 }} />
                {ch}
              </label>
            ))}
          </div>
          <button onClick={() => complete(2)} style={btn.primary}>
            Publish <Play size={12} />
          </button>
        </div>
      ),
    },
  ];

  const allDone = completedSteps.size === steps.length;

  return (
    <div className="flex-1 flex flex-col overflow-hidden" style={{ background: C.bg }}>
      {/* Top bar */}
      <div
        className="flex items-center justify-between shrink-0"
        style={{ padding: "16px 24px", height: 72, boxShadow: `inset 0px -1px 0px ${C.headerDivider}` }}
      >
        <button
          onClick={onBack}
          className="flex items-center gap-1.5"
          style={{ color: C.muted, fontSize: 14, cursor: "pointer", background: "none", border: "none" }}
        >
          <ChevronLeft size={14} />
          Back to imports
        </button>
        <button
          onClick={onBack}
          style={{ ...btn.base, padding: "8px 12px" }}
        >
          <X size={14} style={{ color: C.muted }} />
        </button>
      </div>

      {/* Content */}
      <div className="flex-1 overflow-auto" style={{ padding: "32px 40px" }}>
        <div style={{ maxWidth: 640 }}>
          {allDone ? (
            <div style={{ textAlign: "center", padding: "48px 0" }}>
              <div style={{ width: 52, height: 52, borderRadius: "50%", background: "#dcfce7", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px" }}>
                <Check size={26} style={{ color: "#16a34a" }} strokeWidth={2.5} />
              </div>
              <h2 style={{ fontSize: 20, fontWeight: 500, color: C.fg, marginBottom: 8 }}>You"re all set!</h2>
              <p style={{ fontSize: 14, color: C.muted, marginBottom: 24 }}>Your product catalog is imported and ready to publish.</p>
              <button onClick={onBack} style={btn.primary}>Go to imports</button>
            </div>
          ) : (
            <>
              <div style={{ marginBottom: 24 }}>
                <p style={{ fontSize: 12, color: C.muted, fontWeight: 500, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 4 }}>Setup wizard</p>
                <h2 style={{ fontSize: 20, fontWeight: 500, color: C.fg, marginBottom: 4 }}>Add an import</h2>
                <p style={{ fontSize: 14, color: C.muted }}>Complete the steps below to start importing your product data.</p>
              </div>

              {/* [ADDED] Merchant API detection notice + pre-fill summary */}
              {prefill && <DetectionNotice projectName={prefill.projectName} cms={prefill.cms} />}

              <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                {steps.map((step, i) => {
                  const isDone = completedSteps.has(i);
                  const isOpen = openStep === i;
                  const isLocked = i > 0 && !completedSteps.has(i - 1);

                  return (
                    <div
                      key={i}
                      style={{
                        border: `1px solid ${isOpen && !isDone ? C.primary : C.border}`,
                        borderRadius: 4,
                        overflow: "hidden",
                        opacity: isLocked ? 0.45 : 1,
                        background: C.bg,
                      }}
                    >
                      <button
                        onClick={() => !isLocked && toggle(i)}
                        disabled={isLocked}
                        className="w-full text-left flex items-center justify-between"
                        style={{ padding: "12px 16px", cursor: isLocked ? "default" : "pointer", background: "transparent" }}
                      >
                        <div className="flex items-center gap-3">
                          <StepIndicator done={isDone} active={isOpen && !isDone} number={i + 1} />
                          <span style={{ color: C.muted, display: "flex", alignItems: "center" }}>{step.icon}</span>
                          <span
                            style={{
                              fontSize: 14,
                              fontWeight: isOpen ? 500 : 400,
                              color: isDone && !isOpen ? C.muted : C.fg,
                              textDecoration: isDone && !isOpen ? "line-through" : "none",
                            }}
                          >
                            {step.label}
                          </span>
                          {isDone && (
                            <span style={{ padding: "1px 8px", borderRadius: 40, background: "#dcfce7", color: "#15803d", fontSize: 12, fontWeight: 500 }}>
                              Done
                            </span>
                          )}
                        </div>
                        <ChevronDown
                          size={14}
                          style={{
                            color: C.muted,
                            transform: isOpen ? "rotate(180deg)" : "rotate(0deg)",
                            transition: "transform 200ms",
                            flexShrink: 0,
                          }}
                        />
                      </button>

                      {isOpen && (
                        <div style={{ borderTop: `1px solid ${C.border}`, padding: "16px 16px 20px" }}>
                          {step.content}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}
